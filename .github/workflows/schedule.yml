name: Daily Stock News Bot

on:
  schedule:
    # Runs at 03:00 UTC (8:30 AM IST) Monday through Friday
    - cron: '0 3 * * 1-5'
  workflow_dispatch: # This line adds a "Run workflow" button so you can test it manually

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python News.py  # <--- Changed from main.py to News.py
